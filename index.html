<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids TV Live</title>
    <style>
        /* إزالة أي هوامش أو فراغات */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background: black; 
            overflow: hidden; 
        }

        .player-container { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw; 
            height: 100vh; 
            background: black; 
        }

        #player { 
            width: 100%; 
            height: 100%; 
            border: none;
        }
        /* تم حذف الـ overlay والـ touch-layer نهائياً */
    </style>
</head>
<body>

    <div class="player-container">
        <div id="player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const rawLinks = `
            https://www.youtube.com/watch?v=uLPJIuevODY
            https://www.youtube.com/watch?v=7tPRhJzVjeM
            https://www.youtube.com/watch?v=bppulSQPyzw
            https://www.youtube.com/watch?v=l68FyQK3R6A
            https://www.youtube.com/watch?v=jYUGkXcgwrE
            https://www.youtube.com/watch?v=xGWOkqnTdcA
            https://www.youtube.com/watch?v=_58wFJsS5yo
            https://www.youtube.com/watch?v=lYG67YTgfCA
            https://www.youtube.com/watch?v=Z2p9NrNDnRY
            https://www.youtube.com/watch?v=YYRMNvJKlE8
            https://www.youtube.com/watch?v=t0Q2otsqC4I
            https://www.youtube.com/watch?v=zeBDGkvkgro
            https://www.youtube.com/watch?v=L0BlF04a-MI
            https://www.youtube.com/watch?v=ZooIBL5z-s8
            https://www.youtube.com/watch?v=mBorcJ2Mvx0
            https://www.youtube.com/watch?v=kQMi1q0V7wA
            https://www.youtube.com/watch?v=yiFHpQ-mSCM
            https://www.youtube.com/watch?v=ZFkVwZO0Y-A
        `;

        const videoIDs = rawLinks.trim().split(/\s+/).map(url => {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }).filter(id => id !== null);

        const playlist = videoIDs.map((id, index) => {
            return { id: id, duration: (index === 0) ? 182 : 300 };
        });

        // المرجع الثابت: 8 مايو 2026
        const FIXED_EPOCH = new Date(2026, 4, 8, 0, 0, 0).getTime();
        let player;

        function onYouTubeIframeAPIReady() {
            syncStream();
        }

        function syncStream() {
            const currentTime = Date.now();
            const totalPlaylistTime = playlist.reduce((acc, v) => acc + v.duration, 0);
            let totalElapsed = Math.floor((currentTime - FIXED_EPOCH) / 1000);
            if (totalElapsed < 0) totalElapsed = 0;

            const currentPos = totalElapsed % totalPlaylistTime;
            let timeSum = 0;
            let targetIdx = 0;
            let seekTime = 0;

            for (let i = 0; i < playlist.length; i++) {
                if (currentPos < timeSum + playlist[i].duration) {
                    targetIdx = i;
                    seekTime = currentPos - timeSum;
                    break;
                }
                timeSum += playlist[i].duration;
            }
            loadVideo(playlist[targetIdx].id, seekTime);
        }

        function loadVideo(vidId, startTime) {
            if (player && player.loadVideoById) {
                player.loadVideoById({ videoId: vidId, startSeconds: startTime });
            } else {
                player = new YT.Player('player', {
                    videoId: vidId,
                    playerVars: { 
                        'autoplay': 1, 
                        'start': startTime, 
                        'controls': 1, 
                        'rel': 0, 
                        'playsinline': 1,
                        'modestbranding': 1
                    },
                    events: {
                        'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) syncStream(); },
                        'onError': () => syncStream()
                    }
                });
            }
        }
    </script>
</body>
</html>
